apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler

metadata:
  name: api-gateway-hpa

spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: api-gateway

  minReplicas: 2
  maxReplicas: 5

  behavior:
    scaleUp:
      stabilizationWindowSeconds: 0

      policies:
        - type: Pods
          value: 2
          periodSeconds: 15

    scaleDown:
      stabilizationWindowSeconds: 60

  metrics:
    - type: Resource

      resource:
        name: cpu

        target:
          type: Utilization
          averageUtilization: 30